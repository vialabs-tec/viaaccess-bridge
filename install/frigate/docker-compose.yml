services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      # Opcional: bridge em npm run dev no host ou debug com mosquitto_sub
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto:/mosquitto/config:ro

  # Webcam do Mac: ffmpeg publica em rtsp://127.0.0.1:8555/portao-principal
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8555:8555"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "512mb"
    ports:
      - "5050:5000"
      - "8554:8554"
    volumes:
      - ./frigate/config:/config
      - ./frigate/storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    depends_on:
      - mqtt
      - mediamtx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FRIGATE_RTSP_PASSWORD: "password"

  viaaccess-bridge:
    image: ${VIAACCESS_BRIDGE_IMAGE:-viaaccess-bridge:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FRIGATE_MQTT_URL: mqtt://mqtt:1883
      FRIGATE_BASE_URL: http://frigate:5000
      BRIDGE_STATUS_PATH: /runtime/status.json
      OUTBOX_PATH: /data/outbox.jsonl
    volumes:
      - bridge-data:/data
      - bridge-runtime:/runtime
    depends_on:
      - mqtt
      - frigate

volumes:
  bridge-data:
  bridge-runtime:
