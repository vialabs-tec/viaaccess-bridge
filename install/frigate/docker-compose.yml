services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto:/mosquitto/config:ro

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "512mb"
    ports:
      - "5050:5000"
    volumes:
      - ./frigate/config:/config
      - ./frigate/storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    depends_on:
      - mqtt
    environment:
      FRIGATE_RTSP_PASSWORD: "password"

  viaaccess-bridge:
    image: ${VIAACCESS_BRIDGE_IMAGE:-ghcr.io/vialabs-tec/viaaccess-bridge:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      FRIGATE_MQTT_URL: mqtt://mqtt:1883
      FRIGATE_BASE_URL: http://frigate:5000
      BRIDGE_STATUS_PATH: /runtime/status.json
      OUTBOX_PATH: /data/outbox.jsonl
    volumes:
      - bridge-data:/data
      - bridge-runtime:/runtime
    depends_on:
      - mqtt
      - frigate

volumes:
  bridge-data:
  bridge-runtime:
