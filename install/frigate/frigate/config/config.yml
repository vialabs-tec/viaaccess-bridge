mqtt:
  enabled: true
  host: mqtt
  port: 1883

detectors:
  cpu1:
    type: cpu

cameras:
  portao-principal:
    enabled: true
    ffmpeg:
      inputs:
        # Substitua pela URL RTSP da sua câmera
        - path: rtsp://usuario:senha@192.168.1.100:554/stream
          input_args: preset-rtsp-generic
          roles:
            - detect
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - person
    zones:
      entrada:
        coordinates: 0,720,1280,720,1280,0,0,0
        objects:
          - person

record:
  enabled: false

snapshots:
  enabled: true
  retain:
    default: 1
