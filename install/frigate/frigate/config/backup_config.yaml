mqtt:
  enabled: true
  host: mqtt
  port: 1883

# Host publishes webcam via: npm run webcam:stream (ffmpeg → :8554)
go2rtc:
  streams:
    portao-principal: []

detectors:
  cpu1:
    type: cpu

cameras:
  portao-principal:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/portao-principal
          input_args: preset-rtsp-generic
          roles:
            - detect
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - person
    zones:
      interior:
        coordinates: 0,720,1280,720,1280,0,0,0
        objects:
          - person
      entrada:
        # Full frame — wave at the camera to enter the zone
        coordinates: 0,720,1280,720,1280,0,0,0
        objects:
          - person

record:
  enabled: false

snapshots:
  enabled: true
  retain:
    default: 1
